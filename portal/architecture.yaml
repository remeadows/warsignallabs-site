      - "Seed D1 with 3 workspaces + user_workspaces"
    goal: "Login as rmeadows → 3 workspaces. Login as cdepalma → 2 workspaces."

  day_3_thu_mar_27:
    name: "File Management + Admin"
    tasks:
      - "File upload endpoint: validate → R2 put → D1 record → audit log"
      - "File download endpoint: access check → presigned URL → redirect"
      - "File delete endpoint (admin only)"
      - "Workspace detail page with category tabs + file list"
      - "Drag-and-drop upload component"
      - "Admin pages: user management, workspace management"
      - "Audit log page with filterable timeline"
    goal: "Upload PDF to Blueprint Advisory as rmeadows → download as cdepalma."

  day_4_fri_mar_28:
    name: "Polish + Security Hardening"
    tasks:
      - "CSS polish: animations, transitions, loading states, responsive"
      - "Add 'Enter Portal' link to warsignallabs.net nav"
      - "Security headers (CSP, HSTS, X-Frame-Options)"
      - "Error boundaries + 403/404 pages"
      - "Upload demo content (2-3 docs per workspace)"
      - "Full walkthrough as all 4 accounts"
    goal: "Full end-to-end demo rehearsal. Every click polished."

  day_5_sat_mar_29:
    name: "Buffer + Dress Rehearsal"
    tasks:
      - "Fix anything from Friday testing"
      - "Run exact demo script start to finish"
      - "Verify cdepalma credentials (send Chris creds securely)"
      - "Clear audit log → seed fresh demo activity"
    goal: "Zero surprises on Sunday."

# ──────────────────────────────────────────────
# DEMO SCRIPT — Sunday March 29
# ──────────────────────────────────────────────

demo_script:
  duration: "15 minutes"
  steps:
    - "Start at warsignallabs.net → click 'Enter Portal' in nav"
    - "Login as armeadows (Admin) → show 2FA challenge"
    - "Admin dashboard → all 3 workspaces, system stats, recent activity"
    - "Open Blueprint Advisory workspace → category tabs, upload doc live"
    - "Admin pages → user management, workspace config, audit log"
    - "Logout → hand Chris the keyboard"
    - "Chris logs in as cdepalma → sees only 2 workspaces, no admin"
    - "Chris downloads the doc just uploaded → proves the loop"
    - "The pitch: edge-hosted, your brand, your domain, built in a week"

# ──────────────────────────────────────────────
# CLONE-READY ARCHITECTURE
# ──────────────────────────────────────────────

clone_deployment:
  description: "Env-driven — same codebase, different config per client"
  env_vars:
    - { name: "CLERK_PUBLISHABLE_KEY", desc: "Client's Clerk app" }
    - { name: "D1_DATABASE_ID", desc: "Client's D1 instance" }
    - { name: "R2_BUCKET_NAME", desc: "Client's R2 bucket" }
    - { name: "PORTAL_NAME", desc: "Client's portal display name" }
    - { name: "BRAND_COLOR", desc: "Client's primary accent hex" }
    - { name: "DOMAIN", desc: "Client's portal subdomain" }
  steps:
    - "New CF account (or sub-zone) + D1 + R2 + Worker"
    - "New Clerk app with client branding"
    - "Set 6 env vars"
    - "Deploy — same codebase, different config"

future:
  - "Email notifications (Clerk/Resend) on new uploads"
  - "Client self-service uploads"
  - "D1 → Hyperdrive + Postgres if data grows"
  - "Clerk appearance API for branded login"
  - "API keys for GW-OS pipeline integration"
  - "Portal-as-a-service: managed hosting for consultant clients"
