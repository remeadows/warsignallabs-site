neighboring_projects:
  - name: LOOL
    relationship: independent  # shares no infrastructure with the portal
    cloudflare:
      account: same (210e77c9da5741b3aa1b6199a082d70b)
      workers: [lool, lool-api]  # separate scripts; separate IDs from wsl-portal-api
    clerk:
      relationship: separate Clerk Application (own pk_test_/sk_test_)
    note: |
      LOOL is built in parallel with the portal but shares no infrastructure
      beyond the Cloudflare account. Treat any symptom that seems to span
      both as unrelated by default and require evidence before linking. This
      was triaged on 2026-05-03 when LOOL was suspected of disrupting the
      portal — it had not.
