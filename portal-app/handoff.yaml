session_2026_07_21_to_23_phase3_collab: |
  PHASE 3 BUILT, REVIEWED, MERGED — v0.5.0 live on main (PR #29, squash commit
  49401f2). Branch feat/portal-phase3-collab (deleted post-merge). Plan:
  docs/superpowers/plans/2026-07-21-portal-phase3-collab.md. Spec:
  docs/superpowers/specs/2026-07-19-phase3-comments-activity-notifications-
  design.md. 11 tasks, TDD where applicable (pure-function helpers unit
  tested first), each task independently verified (tests/lint/build/
  wrangler --dry-run) before commit.

  SHIPPED:
    - Migration 007_comments_notifications.sql: comments + notification_inbox
      tables, users.email_pref, audit_log.workspace_id. Corrected from the
      spec's stale 003_ filename (Phase 2 had already claimed 002-006).
      ADR-0004 written (D1 schema changes require one per AGENTS.md; none of
      Phase 1/2's migrations had one either, but that's not a reason to keep
      skipping it).
    - Comments: workspace + per-file threads, one-level-deep replies
      (rejected, never re-parented), soft delete ("[deleted]" stub, replies
      survive), author-only edit while not deleted, author/wsAdmin/global-
      admin delete. @mention parsing scoped to that workspace's members only.
    - Notifications: notifyWorkspaceEvent now writes an inbox row
      unconditionally per recipient and gates only the email leg by
      email_pref (all/mentions/none) — inbox delivery cannot be opted out of,
      only the email leg is gated by preference. Topnav bell (60s poll, unread badge, dropdown,
      mark-all-read).
    - Activity feed: paginated audit_log scoped to a workspace via the new
      workspace_id column, backfilled at 18 existing call sites across
      files/folders/members/workspaces routes. Excludes workspace.view
      (fires on every page load — would flood the feed).
    - Frontend: CommentThread (Discussion tab + file-comment slide-over),
      ActivityTab, email-preference radio on workspace Settings.

  REVIEW CYCLE (PR #29) — 4 rounds, Codex + CodeRabbit, ~30 actionable
  findings total, all resolved (27 threads, 25 fixed/addressed + 2 deferred
  to a follow-up PR that merged before this PR did):
    - Real bugs found and fixed: cross-workspace/mismatched-entity comments
      (no validation that entity_id belonged to the workspace, or that a
      reply's parent shared the same entity); stale workspace membership on
      comment edit/delete (author/admin checks didn't recheck current
      requireWorkspaceAccess, so a removed member could still act on old
      comments); 3 comment audit events missing workspaceId (would never
      have shown in the Activity feed); workspace deletion would have broken
      the first time any workspace had comments or audit history (fixed via
      comments explicit-delete + audit_log ON DELETE SET NULL); negative/
      invalid `limit` params treated as "no limit" by SQLite on two
      endpoints; bare `null` JSON body causing 500s instead of 400s; several
      React stale-closure/race bugs in new components reused across
      workspace navigation without remounting (ActivityTab, CommentThread,
      WorkspaceSettingsTab, WorkspaceDetail's file-comment panel and tab
      state) — fixed with the effect-cleanup-cancel pattern, not ad-hoc
      flags. One pass introduced a genuinely new lint error (ref mutated
      during render) while fixing a race — caught by CI, fixed properly
      (ref updates moved into their own effect).
    - False positive correctly pushed back on: CodeRabbit repeatedly flagged
      `wsAdmin`/`hasWorkspaceAdminPermission` allowing client-role users with
      per-workspace admin permission as a bug. Verified against actual
      code (unmodified Phase 2 logic from PR #27, backend enforcement
      matches exactly) before declining — a client CAN legitimately hold
      workspace-admin permission, that's the whole point of Phase 2's
      permission-tier model. CodeRabbit withdrew the finding after the
      explanation and logged a standing "learning" note for this repo.
    - Deferred to a follow-up (PR #30, merged into this branch before this
      PR merged to main): both list endpoints' created_at-only pagination
      cursor can skip same-second rows at a page boundary. Real but
      low-probability at this app's actual write volume; fixed properly
      with an opaque (created_at, id) compound seek cursor on both
      endpoints + both frontend consumers, done by a separate session
      working in parallel.

  Deploy done later the same day — see session_2026_07_23_phase3_deploy
  above (this entry is kept as written at the time for the review-cycle
  detail; it's no longer current on deploy status).

session_2026_07_19_phase2_collab: |
  PHASE 2 BUILT + DEPLOYED — v0.4.0 live in production, PR pending merge.
  Branch feat/portal-phase2-collab (worktree .claude/worktrees/feat-portal-
  phase2-collab). Plan: docs/superpowers/plans/2026-07-18-portal-phase2-
  collab.md. Spec: docs/superpowers/specs/2026-07-18-phase2-workspaces-
  members-permissions-design.md. 10 tasks, subagent-driven-development,
  every task independently reviewed.

  SHIPPED:
    - Authz model: `owner` role (Chris/usr-004, displayed as "Collaborator"
      in all UI) no longer bypasses per-workspace checks — only global
      `admin` does. New ceiling helpers hasWorkspaceAdminPermission +
      memberChangeViolation (unit-tested). Admin plane (users/audit/
      analytics/dashboard) narrowed to admin-only. Owner CAN create
      workspaces (auto admin membership) and manage members/settings on
      workspaces where they hold admin permission; CANNOT delete any
      workspace, touch global admins, or see admin endpoints.
    - Members + invitations: routes/members.js (list/patch/remove members;
      create/list/revoke invitations), invitation acceptance wired into
      requireAuth's email-match path, Resend email on invite. Migrations
      002 (invitations table) + 003 (usr-004 -> owner, usr-003 -> admin).
    - Frontend: workspace Members + Settings tabs, sidebar New Workspace
      modal, admin plane hidden for non-admins, shared role labels.

  THREE PRODUCTION BUGS found + fixed during acceptance (all latent,
  none introduced by Phase 2 — Phase 2's new traffic patterns exposed them):
    1. users.status CHECK constraint lacked 'invited' -> invites 503'd.
       Fixed via migration 004 (table rebuild).
    2. D1's ALTER TABLE RENAME auto-retargets OTHER tables' FK references
       (local sqlite3 does NOT reproduce this) -> 004's rebuild broke all
       writes to files/user_workspaces/invitations (active outage: uploads
       dead). Fixed via migration 005 (rebuilt 4 tables in dependency
       order, one transaction). Data verified intact: 4 users, 4
       workspaces, 18 files, FK check clean.
    3. router.js returned async handlers WITHOUT await -> any Response
       thrown inside a handler escaped the try/catch as an unhandled
       rejection -> Cloudflare 1101 instead of clean 403 JSON. Latent since
       Phase 1 (requireAuth IS awaited, so 401s always worked; no live
       request had ever thrown from inside a handler until the owner-role
       ceiling tests). Fixed cb1c079 (await on all 40 returns + behavioral
       regression test, verified red->green).

  CEILING TESTS: all 10 pass live (usr-001 temporarily flipped to owner
  with Russ's approval, reverted + verified after): admin endpoints 403 x4,
  no-membership workspace 403, workspace delete 403 (even own), file
  delete w/ write-only 403, remove/downgrade global admin 403 x2, owner
  workspace create 201. All test artifacts cleaned up; final prod state
  verified at baseline counts with correct roles.

  INCIDENT (resolved): usr-001 briefly self-demoted to owner via an
  accidental click on the Admin Users role dropdown during the deploy
  window (root-caused via audit_log, restored via D1). Led to the
  ROLE_LABELS UI fix (2c11fb1) — raw "owner" value no longer shown.

  NEXT: merge PR (after final whole-branch review). Deferred/follow-ups
  tracked in .superpowers/sdd/progress.md while the worktree lives, and in
  the PR description: buildEmailHtml HTML-escaping (all notify.js callers,
  standalone task), route-handler integration tests, TOCTOU on last-admin
  check (academic at 4 users), stale "admin/owner" doc comments.

