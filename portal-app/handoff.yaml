        before and after the frontend deploy.

  POST-REVIEW FIXES (found and fixed during PR review, both real, both
  independently verified against actual code/prod before fixing — not
  just applied on a bot's say-so):
    - 000_baseline.sql was wrong in most tables, not just the one CodeRabbit/
      Codex flagged (briefs was missing 10 columns + had the wrong PK — prod
      has no `id` column, `date` is the real PK). Queried real prod schema
      for every table + index and rewrote the whole file to match exactly.
    - CRITICAL SECURITY: requireAuth's fallback (worker/src/auth.js) granted
      role/workspaceSlugs straight from Clerk publicMetadata when no D1 user
      matched — contradicts this project's own "D1 is authoritative, never
      trust Clerk metadata" principle (documented in PortalAuth.jsx /
      PortalLayout.jsx). Pre-existing since before this refactor (verbatim-
      moved in Task 5), not introduced by it, but real: a Clerk account with
      stale admin metadata and no D1 row would get full API access. Fixed —
      unprovisioned users now get 403. Deployed to production ahead of the
      PR merge given the severity (Russ approved). Regression test not
      added: requireAuth does live JWT verification + D1 I/O inline, no
      extraction point for a pure unit test without a larger refactor —
      flagged as a follow-up, not silently dropped.
    - Also found (twice) a wrong-checkout mistake where a task implementer's
      output briefly landed in the main checkout instead of the worktree
      (Task 9, then Task 10) — both times caught, verified byte-identical
      to the correct/merged version, and discarded safely from main.

  Current production state: Worker version 052fc10b-c0d8-4e5e-a504-
