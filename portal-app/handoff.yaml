# handoff.yaml — current-state / in-flight work for the portal.
# Companion to memory.yaml (long-lived project context).
# Update this file at the end of every working session.

last_updated: 2026-05-03
last_session_summary: |
  Russ reported the same blue-screen symptom Chris had been hitting and
  hypothesized that parallel work on a separate "LOOL" project (its own
  Cloudflare workers + its own Clerk Application) had disrupted the portal.
  Triaged the live stack and refuted the LOOL hypothesis on infrastructure:
  - Pages serves portal.warsignallabs.net 200 with the correct bundle hash
    (index-Gi1wp55V.js) and a CSP that whitelists *.clerk.accounts.dev.
  - wsl-portal-api returns 401 unauth on both api.warsignallabs.net and the
    workers.dev URL; worker last modified 2026-04-03 (untouched).
  - LOOL workers (lool, lool-api) are separate scripts with separate IDs,
    last modified 2026-05-03 13:46 UTC — independent of the portal.
  - Clerk dev instance sharing-gator-67 is alive and returning environment
    config; its application_name is still "WSL Portal".
  Browser-side evidence narrows the failure to the same Clerk-cookie wall
  that hit Chris: Clerk SDK does load (dev-keys warning fires), but the URL
  spirals into /#/?redirect_url=... — meaning <SignedOut> matches and
  RedirectToSignIn loops because the third-party __client cookie on
  *.clerk.accounts.dev cannot be persisted by Russ's browser. Incognito
  also fails, which is consistent with the hypothesis (incognito blocks 3p
  cookies by default). Trigger was almost certainly cookie-state aging into
  the third-party-cookie wall, coincident with LOOL work but not caused by
  it. Same architectural fix already planned: production Clerk instance
  with custom domain clerk.warsignallabs.net.

  Revised Phase 1 approach — instead of creating a new Clerk APPLICATION,
  add a Production INSTANCE under the existing "WSL Portal" application via
  "Clone settings from Development". This auto-mirrors identifier config,
  name fields, sessions, CAPTCHA, branding, paths — eliminating the manual
  mirror checklist. Custom domain, OAuth credentials, and keys remain
  per-instance. Russ is now executing the revised Phase 1.

